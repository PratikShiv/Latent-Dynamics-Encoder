env:
  num_envs: 10
  max_episode_steps: 2000
  cmd_vx_range: [0.3, 1.5]        # Forward velocity
  cmd_vy_range: [0.0, 0.0]
  cmd_yaw_rate_range: [0.0, 0.0]  # No yaw.
  dynamics:
    friction_range: [0.3, 1.5]
    mass_scale_range: [0.7, 1.4]
    action_delay_range: [0, 4]         # In simulation steps
    obs_delay_range: [0, 3]           # In simulation steps
    external_force_range: [0.0, 3.0]  # Newtons

teacher:
  hidden_sizes: [256, 256]
  lr_actor: 1.0e-4
  lr_critic: 3.0e-4
  gamma: 0.99
  lam: 0.97
  clip_ratio: 0.2
  entropy_coeff: 0.001
  batch_size: 24576
  minibatch_size: 4096
  update_epochs: 5
  iterations: 8000
  max_grad_norm: 0.5
  seed: 42
  save_dir: results

encoder:
  history_length: 50    # H -- How many past (obs, act) pairs to encode on
  latent_dim: 8         # d_z -- Size of dynamics embedding
  hidden_sizes: [256, 256]

student:
  hidden_sizes: [256, 256]

distillation:
  lr: 1.0e-3             # Higher LR is fine. This is supervised, not RL
  z_reg_coeff: 1.0e-4    # Lambda. Loss = MSE + Lamba*||z||^2
  priv_loss_coeff: 2.0   # Weight of the z -> privileged dynamics regression
  batch_size: 24576      # Env steps collected per iteration
  iterations: 1000
  inner_epochs: 5

finetune:
  lr_actor: 1.0e-4
  lr_critic: 3.0e-4
  total_steps: 500000